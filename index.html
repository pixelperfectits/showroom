<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>THE VAULT | Verified Proof of Work | Pixel Perfect IT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #cbd5e1; overflow-x: hidden; }
        .bg-grid { background-image: radial-gradient(rgba(0, 242, 255, 0.1) 1px, transparent 1px); background-size: 40px 40px; }
        .glass-panel { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .neon-glow { text-shadow: 0 0 20px rgba(0, 242, 255, 0.7); color: #00F2FF; }
        .tab-btn { cursor: pointer; border-radius: 12px; padding: 12px 24px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; border: 1px solid rgba(255,255,255,0.05); }
        .tab-btn.active { background: rgba(0, 242, 255, 0.1); border-color: #00F2FF; color: #00F2FF; }
        .content-sec { display: none; }
        .content-sec.active { display: block; }
    </style>
</head>
<body class="bg-grid p-6 md:p-20">
    <nav class="flex justify-between items-center mb-20">
        <div class="flex items-center gap-4">
            <img src="https://raw.githubusercontent.com/pixelperfectits/assets/main/Flat%20Minimal%20Neon%20Icon.png" class="w-10 h-10 shadow-[0_0_20px_#00F2FF] rounded-xl">
            <h1 class="text-2xl font-black text-white uppercase italic">THE <span class="neon-glow">VAULT</span></h1>
        </div>
        <a href="https://pixelperfectits.github.io/" class="text-[10px] font-black uppercase text-slate-500 hover:text-white transition-all">Back to HQ</a>
    </nav>

    <header class="text-center mb-20">
        <h2 class="text-5xl md:text-7xl font-black text-white uppercase italic mb-4">Empirical Evidence</h2>
        <p class="text-slate-500 uppercase font-bold tracking-widest text-xs">Verified Case Studies & High-Volume Production Assets</p>
    </header>

    <div class="flex flex-wrap justify-center gap-4 mb-20">
        <button onclick="openTab('design')" id="btn-design" class="tab-btn active">Visual Production</button>
        <button onclick="openTab('audit')" id="btn-audit" class="tab-btn">Diagnostics</button>
        <button onclick="openTab('land')" id="btn-land" class="tab-btn">Land Intelligence</button>
        <button onclick="openTab('systems')" id="btn-systems" class="tab-btn">Blueprints</button>
    </div>

    <main class="max-w-7xl mx-auto">
        <!-- Visual Production Hub (High Volume) -->
        <div id="sec-design" class="content-sec active">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <div class="glass-panel p-10 rounded-[40px]">
                    <i data-lucide="palette" class="text-yellow-500 w-8 h-8 mb-6"></i>
                    <h4 class="text-xl font-bold text-white uppercase mb-4">Print & Media Archive</h4>
                    <p class="text-sm text-slate-500 mb-8 font-bengali leading-relaxed">১০০% প্রিন্ট-রেডি স্কুল/কলেজ কিট এবং প্রাতিষ্ঠানিক ব্র্যান্ডিং।</p>
                    <a href="./design/print-catalog.html" class="text-yellow-500 text-[10px] font-black uppercase">View Collection →</a>
                </div>
                <div class="glass-panel p-10 rounded-[40px]">
                    <i data-lucide="monitor" class="text-neonCyan w-8 h-8 mb-6"></i>
                    <h4 class="text-xl font-bold text-white uppercase mb-4">UI/UX Landing Forge</h4>
                    <p class="text-sm text-slate-500 mb-8 font-bengali leading-relaxed">হাই-কনভার্টিং ল্যান্ডিং পেজ এবং ওয়েব ইন্টারফেস শোকেস।</p>
                    <a href="./design/ui-showcase.html" class="text-neonCyan text-[10px] font-black uppercase">View Collection →</a>
                </div>
            </div>
        </div>

        <!-- Other sections like Audit, Land follow the same pattern -->
    </main>

    <script>
        lucide.createIcons();
        function openTab(tabId) {
            document.querySelectorAll('.content-sec').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sec-' + tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
        }
    </script>
</body>
</html>
