<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibrant Quad Admit Card | Pixel Perfect IT Production</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mina:wght@700&family=Hind+Siliguri:wght@600;700&family=Inter:wght@800;900&display=swap" rel="stylesheet">
    <style>
        /* Force Supreme Boldness & High-Fidelity Print */
        * { font-weight: 800 !important; -webkit-print-color-adjust: exact; margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #020617; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        /* ALL DEVICE AUTO-SCALING ENGINE (LANDSCAPE) */
        .a4-wrapper {
            width: 297mm; height: 210mm;
            display: flex; align-items: center; justify-content: center;
            transform: scale(calc(min(94vw / 297, 94vh / 210)));
            transform-origin: center center;
        }

        .a4-sheet {
            width: 297mm; height: 210mm; background: #fff;
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
            /* HIGH-VISIBILITY CUBE TEXTURE */
            background-image: url('https://www.transparenttextures.com/patterns/white-diamond.png');
            box-shadow: 0 0 120px rgba(0,0,0,0.8);
            position: relative;
        }

        /* Cutting Guides */
        .cut-v { position: absolute; left: 50%; top: 0; bottom: 0; border-left: 2px dashed #cbd5e1; z-index: 50; }
        .cut-h { position: absolute; top: 50%; left: 0; right: 0; border-top: 2px dashed #cbd5e1; z-index: 50; }

        .card-container { padding: 6mm; position: relative; display: flex; flex-direction: column; }

        /* Double Outline Rounded Frame */
        .outer-frame {
            height: 100%; width: 100%; border: 3px solid #1e3a8a; border-radius: 30px; padding: 3px; background: #fff;
        }
        .inner-frame {
            height: 100%; width: 100%; border: 6px double #0ea5e9; border-radius: 26px; padding: 15px;
            background: rgba(255, 255, 255, 0.4); display: flex; flex-direction: column; position: relative;
            overflow: hidden;
        }

        /* Red Seal Logic */
        .official-seal {
            position: absolute; top: 5px; left: 5px;
            width: 50px; height: 50px; border: 3px double #dc2626;
            border-radius: 50%; color: #dc2626; display: flex; align-items: center;
            justify-content: center; text-align: center; font-size: 6px;
            line-height: 1; font-weight: 900; transform: rotate(-15deg);
            z-index: 10; background: rgba(220, 38, 38, 0.02);
        }

        /* Typography & Slots */
        .school-capsule { background: #1e3a8a; color: #fff; padding: 6px 20px; border-radius: 50px; border: 2px solid #000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); margin-bottom: 5px; }
        .school-title { font-family: 'Mina', sans-serif; font-size: 16px; white-space: nowrap; }
        
        .admit-tag { background: #f59e0b; color: #000; padding: 4px 15px; border-radius: 4px; border: 2px solid #000; font-size: 11px; transform: skewX(-10deg); box-shadow: 3px 3px 0px #000; }

        .info-slot { border-radius: 10px; border: 2px solid #1e3a8a; padding: 6px 12px; display: flex; align-items: center; gap: 8px; background: #fff; margin-bottom: 8px; }
        .slot-purple { border-color: #7c3aed; background: #f5f3ff; color: #7c3aed; }
        .slot-emerald { border-color: #059669; background: #ecfdf5; color: #059669; }
        .slot-blue { border-color: #2563eb; background: #eff6ff; color: #2563eb; }

        .dotted-fill { border-bottom: 2px dotted #94a3b8; flex-grow: 1; height: 10px; }

        @media print {
            @page { size: A4 landscape; margin: 0; }
            body { background: white; }
            .a4-wrapper { transform: none; }
            .no-print { display: none; }
            .a4-sheet { box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

    <div class="a4-wrapper">
        <div class="a4-sheet">
            <!-- CUTTING GUIDES -->
            <div class="cut-v"></div>
            <div class="cut-h"></div>

            <!-- ADMIT CARD REPEAT GENERATOR -->
            <script>
                const cardMarkup = `
                <div class="card-container">
                    <div class="outer-frame">
                        <div class="inner-frame">
                            <div class="official-seal">OFFICIAL SEAL<br>CHARCHANDRA<br>2025</div>
                            
                            <!-- Header -->
                            <header class="text-center flex flex-col items-center mb-4">
                                <div class="school-capsule">
                                    <h1 class="school-title">চরচান্দ্রা আইডিয়াল কিন্ডারগার্টেন</h1>
                                </div>
                                <p class="text-[7px] font-bold text-slate-500 uppercase tracking-widest">Shibchar, Madaripur, Bangladesh</p>
                            </header>

                            <!-- Badge -->
                            <div class="flex flex-col items-center mb-4">
                                <div class="admit-tag font-black uppercase italic tracking-tighter">
                                    প্রবেশপত্র (ADMIT CARD)
                                </div>
                                <p class="text-[8px] font-black text-indigo-700 uppercase tracking-[0.4em] mt-3 italic">২য় সেমিস্টার পরীক্ষা - ২০২৫</p>
                            </div>

                            <!-- Input Grid -->
                            <section class="space-y-2 mb-4">
                                <div class="info-slot slot-blue">
                                    <i data-lucide="user" class="w-3.5 h-3.5"></i>
                                    <span class="text-[9px] uppercase">নাম (Name):</span>
                                    <div class="dotted-fill"></div>
                                </div>
                                
                                <div class="grid grid-cols-2 gap-3">
                                    <div class="info-slot slot-purple">
                                        <i data-lucide="book-open" class="w-3.5 h-3.5"></i>
                                        <span class="text-[9px] uppercase">শ্রেণি:</span>
                                        <div class="dotted-fill"></div>
                                    </div>
                                    <div class="info-slot slot-emerald">
                                        <i data-lucide="hash" class="w-3.5 h-3.5"></i>
                                        <span class="text-[9px] uppercase">রোল:</span>
                                        <div class="dotted-fill"></div>
                                    </div>
                                </div>

                                <div class="info-slot border-slate-300">
                                    <i data-lucide="credit-card" class="w-3.5 h-3.5 text-slate-400"></i>
                                    <span class="text-[9px] uppercase text-slate-500">আইডি নম্বর (ID No):</span>
                                    <div class="dotted-fill"></div>
                                </div>
                            </section>

                            <!-- Signatures -->
                            <footer class="flex justify-between items-end mt-auto px-2 pb-1">
                                <div class="text-center w-24">
                                    <div class="border-t-2 border-slate-900 border-dashed pt-1">
                                        <p class="text-[7px] font-black uppercase tracking-widest text-slate-800">Class Teacher</p>
                                    </div>
                                </div>
                                <div class="text-center w-24">
                                    <div class="border-t-2 border-red-600 border-dashed pt-1">
                                        <p class="text-[7px] font-black uppercase tracking-widest text-red-700">Principal</p>
                                    </div>
                                </div>
                            </footer>
                        </div>
                    </div>
                </div>`;

                for (let i = 0; i < 4; i++) {
                    document.write(cardMarkup);
                }
            </script>
        </div>
    </div>

    <!-- PRINT FAB -->
    <div class="fixed bottom-8 right-8 no-print">
        <button onclick="window.print()" class="bg-gradient-to-br from-blue-700 to-sky-500 text-white p-6 rounded-full shadow-[0_15px_40px_rgba(14,165,233,0.5)] hover:scale-110 transition-all border-2 border-white">
            <i data-lucide="printer" class="w-8 h-8"></i>
        </button>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
